<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 400px;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        button {
            width: 48%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .register {
            background-color: #28a745;
        }

        .register:hover {
            background-color: #218838;
        }

        .alternate {
            background-color: #007BFF;
        }

        .alternate:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>User Registration</h2>

    <form action="https://example.com/register" method="post">

        <label for="fname">First Name</label>
        <input
            type="text"
            id="fname"
            name="first_name"
            value="John"
            autofocus
            required
            minlength="2"
        >

        <label for="lname">Last Name</label>
        <input
            type="text"
            id="lname"
            name="last_name"
            required
            minlength="2"
        >

        <label for="email">Email Address</label>
        <input
            type="email"
            id="email"
            name="email"
            placeholder="example@email.com"
            required
        >

        <label for="password">Password</label>
        <input
            type="password"
            id="password"
            name="password"
            minlength="8"
            required
        >

        <div class="buttons">

            <button type="submit" class="register">
                Register
            </button>

            <button
                type="submit"
                class="alternate"
                formaction="https://example.com/alternate-register">
                Register (Alternate)
            </button>

        </div>

    </form>

</div>

</body>
</html>
